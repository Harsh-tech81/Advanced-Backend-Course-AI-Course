services:
   nginx:
     image: nginx
     ports:
       - 8000:80
     volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf


   server1:
     build: ./server
     ports:
       - 5000:7000
     env_file:
       - ./phase1/server/.env
     environment:
       - SERVER_NAME=First Server


   server2:
     build: ./server
     ports:
       - 5001:7000
     env_file:
       - ./phase1/server/.env
     environment:
       - SERVER_NAME=Second Server

   server3:
     build: ./server
     ports:
       - 5002:7000
     env_file:
       - ./phase1/server/.env
     environment:
       - SERVER_NAME=Third Server